# Same as min but with internal DOS diagnostics: capture stdout to
# file, list the D: drive before exit so we see what CERBERUS created.

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo STEP 1 before cerberus > D:\STAGING.LOG
dir d:\*.INI >> D:\STAGING.LOG
cerberus /ONLY:DET /NOINTRO /NOUI /NOUPLOAD /O:D:\SMOKE-RC2.INI >> D:\STAGING.LOG
echo STEP 2 cerberus rc=%errorlevel% >> D:\STAGING.LOG
dir d:\*.INI >> D:\STAGING.LOG
dir d:\*.LOG >> D:\STAGING.LOG
echo STEP 3 done >> D:\STAGING.LOG
exit
