# Focused capture for the F1 help overlay. /QUICK skips all visual-
# journey cards, /SKIP:DIAG /SKIP:BENCH makes the three-pane summary
# appear as fast as possible, so F1 sent by the capture harness
# hits while the summary is waiting for user input.

[dosbox]
machine         = svga_s3

[cpu]
core            = auto
cputype         = auto

[render]
scaler          = normal2x

[autoexec]
mount c "C:\Development\CERBERUS\dist"
mount d "C:\Development\CERBERUS\devenv"
c:
cerberus /NICK:SCREENSHOT /NOTE:help-overlay /NOINTRO /QUICK /SKIP:DIAG /SKIP:BENCH /O:D:\CAP_HELP.INI
exit
