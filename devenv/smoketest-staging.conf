# DOSBox Staging smoketest config for CERBERUS v0.7.0+.
#
# Staging's FPU emulation handles CERBERUS's detection + diagnostic
# paths (unlike DOSBox-X's 8087-only emulator, which chokes on every
# v0.7.0 x87 codepath — see CERBERUS issue #7).
#
# Bench path is still blocked: the x87 Whetstone asm kernel hangs
# Staging the same way it hangs DOSBox-X. So we use `/SKIP:BENCH`
# to emit an INI with detection + diagnosis data only. That's
# enough to validate the server's intake + parse + render contract,
# and v0.7.1 added the diag_fpu_fingerprint module which wants the
# full Phase 2 diagnose pass to surface its keys.
# Emulated bench numbers would be untrusted anyway (CERBERUS's
# emulator-detect path caps confidence at MEDIUM).
#
# Output filename MUST be 8.3-compliant: `SMOKE-RC.INI` (exactly 8
# chars + 3-char extension). Trying `SMOKE-RC2.INI` silently
# truncates to `SMOKE-RC.INI` (dropping the `2`) because DOS can
# only represent 8.3 names.
#
# Usage:
#   dosbox.exe -conf smoketest-staging.conf -exit
# Completes in ~10-20 seconds. Result: devenv/SMOKE-RC.INI

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS Staging smoketest start ===
rem /SKIP:BENCH runs DET + DIAG only. The full bench suite takes
rem >120 sec under DOSBox Staging's emulation overhead (Whetstone
rem outright hangs; Dhrystone's 5-sec target runs many minutes under
rem the emulated timer; even cpu+memory+cache+video accumulate to
rem >100 sec). Real-hardware captures via the 486 FTP workflow
rem validate the bench-path keys. The INI still picks up all DET/DIAG
rem output including v0.7.1's [diagnose.fpu.*] fingerprint keys and
rem [timing] method/jitter keys. /NOINTRO skips the ANSI splash,
rem /NOUI skips the interactive summary, /NOUPLOAD skips the prompt.
cerberus /SKIP:BENCH /NOINTRO /NOUI /NOUPLOAD /O:D:\SMOKE-RC.INI > D:\SMOKE-RC.LOG
echo rc=%errorlevel% > D:\SMOKE-RC.RC
echo === done ===
exit
