# DOSBox Staging smoketest config for CERBERUS 0.8.1.
#
# Exercises the 0.8.1-new surface:
#   - M1.1 diagnose.fpu.edge_cases_ok (edge-case diagnostic)
#   - M1.2 /CSV output (sibling CSV file alongside the INI)
#   - M3.2 probe_et4000_chipid() runs safely on Staging's S3 emulation
#          (expected: returns NULL, falls through to BIOS-string scan)
#   - M3.3 video.hercules_variant key is gated on ADAPTER_HERCULES,
#          which Staging does not report; key absent is the pass signal.
#
# bench_cache_char self-skips under emulators (probe shape unreliable
# on host-cached guest), so M2.1/M2.2/M2.3 do NOT exercise here.
# Those are real-iron-only and their host-side validation comes from
# test_bench_cache_char asserting the pure inference helpers.
#
# Usage from the CERBERUS root:
#   "C:\Users\tonyu\AppData\Local\Programs\DOSBox Staging\dosbox.exe" \
#     --fast-launch --exit -conf devenv\smoketest-0-8-1.conf
#
# Completes in ~10-20 seconds. Result files:
#   devenv\SMOKE081.INI, SMOKE081.CSV, SMOKE081.LOG, SMOKE081.RC

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS 0.8.1 smoketest start ===
rem /CSV emits a sibling CSV file alongside the INI.
rem /SKIP:BENCH keeps the run under ~20 seconds (bench path takes minutes
rem under Staging emulation even with Whetstone emit-gated out).
rem DET + DIAG exercises every 0.8.1-new path that isn't cache-specific.
cerberus /SKIP:BENCH /NOINTRO /NOUI /NOUPLOAD /CSV /O:D:\SMOKE081.INI > D:\SMOKE081.LOG
echo rc=%errorlevel% > D:\SMOKE081.RC
echo === done ===
exit
