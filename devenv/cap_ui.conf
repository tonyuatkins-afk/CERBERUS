# DOSBox Staging config for the screenshot capture harness — interactive
# three-pane UI variant. Runs CERBERUS without /NOUI so the scrollable
# summary renders; /NOINTRO skips the animated splash to land cleaner
# for screenshots.

[dosbox]
machine         = svga_s3

[cpu]
core            = auto
cputype         = auto

[render]
scaler          = normal2x

[autoexec]
mount c "C:\Development\CERBERUS\dist"
mount d "C:\Development\CERBERUS\devenv"
c:
cerberus /NICK:SCREENSHOT /NOTE:screenshot-capture /NOINTRO /SKIP:DIAG /SKIP:BENCH /O:D:\CAP_UI.INI
exit
