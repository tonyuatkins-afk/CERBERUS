# DOSBox-X smoketest config for capturing a fresh v0.7.0-rc2 CERBERUS.INI.
# Differs from smoketest.conf in ONE way: C: mounts the repo root
# instead of dist/, so the current CERBERUS.EXE is what runs.
#
# Result: D:\SMOKE-RC2.INI (= C:\Development\CERBERUS\devenv\SMOKE-RC2.INI)
# Feed that into barelybooting-server's simulate_upload.py:
#
#   python tools/simulate_upload.py ^
#       C:\Development\CERBERUS\devenv\SMOKE-RC2.INI
#
# Takes ~90 seconds to run; drops out of DOSBox-X automatically on
# completion. /QUICK keeps it batch-friendly (no visual journey).

[sdl]
output        = surface
autolock      = false
waitonerror   = false

[dosbox]
title         = CERBERUS v0.7.0-rc2 INI capture

[cpu]
core          = normal
cputype       = 486
cycles        = fixed 25000

[render]
scaler        = none

[serial]
serial1       = disabled
serial2       = disabled
serial3       = disabled
serial4       = disabled

[parallel]
parallel1     = disabled

[printer]
printer       = false

[dos]
hard drive data rate limit = 0

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS v0.7.0-rc2 INI capture ===
cerberus /QUICK /NOINTRO /NOUPLOAD /O:D:\SMOKE-RC2.INI > D:\SMOKE-RC2.LOG
echo rc=%errorlevel% > D:\SMOKE-RC2.RC
echo === captured to D:\SMOKE-RC2.INI ===
exit
