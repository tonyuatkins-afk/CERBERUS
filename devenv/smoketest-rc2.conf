# DOSBox-X smoketest config for capturing a fresh v0.7.0-rc2 CERBERUS.INI.
# Differs from smoketest.conf in ONE way: C: mounts the repo root
# instead of dist/, so the current CERBERUS.EXE is what runs.
#
# Result: D:\SMOKE-RC2.INI (= C:\Development\CERBERUS\devenv\SMOKE-RC2.INI)
# Feed that into barelybooting-server's simulate_upload.py:
#
#   python tools/simulate_upload.py ^
#       C:\Development\CERBERUS\devenv\SMOKE-RC2.INI
#
# Takes ~90 seconds to run; drops out of DOSBox-X automatically on
# completion. /QUICK keeps it batch-friendly (no visual journey).

[sdl]
output        = surface
autolock      = false
waitonerror   = false

[dosbox]
title         = CERBERUS v0.7.0-rc2 INI capture

[cpu]
core          = normal
cputype       = 486
# Unthrottled. For INI capture we don't care about emulated-hardware
# fidelity, we want the run to finish. Benchmarks will produce
# host-speed numbers; that's fine because the confidence_penalty
# flag caps these at MEDIUM when emulator=dosbox-x is detected.
cycles        = max

[render]
scaler        = none

[serial]
serial1       = disabled
serial2       = disabled
serial3       = disabled
serial4       = disabled

[parallel]
parallel1     = disabled

[printer]
printer       = false

[dos]
hard drive data rate limit = 0

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS v0.7.0-rc2 INI capture ===
rem /SKIP:BENCH: DOSBox-X's FPU is 8087-only and chokes on the x87
rem Whetstone asm kernel. Detection + diagnostics alone populate every
rem INI section the server parser reads, which is what we need here.
cerberus /QUICK /NOINTRO /NOUI /NOUPLOAD /SKIP:BENCH /O:D:\SMOKE-RC2.INI > D:\SMOKE-RC2.LOG
echo rc=%errorlevel% > D:\SMOKE-RC2.RC
echo === captured to D:\SMOKE-RC2.INI ===
exit
