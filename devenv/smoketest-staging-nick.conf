# Variant with /NICK:TESTNICK to test whether the buffer-leak bug
# happens only when /NICK is absent.

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
cerberus /ONLY:DET /NOINTRO /NOUI /NOUPLOAD /NICK:TESTNICK /O:D:\NICKTEST.INI > D:\NICKTEST.LOG
echo rc=%errorlevel% > D:\NICKTEST.RC
exit
