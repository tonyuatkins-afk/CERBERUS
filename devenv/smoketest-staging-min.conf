# Minimal Staging config: defaults for everything, autoexec only.
# Goal: run CERBERUS with skip-bench + skip-diag + no-ui flags so
# the binary hits only detection code and exits fast. Filters down
# to the narrowest possible path we need for server-contract capture.

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS Staging min capture start ===
cerberus /ONLY:DET /NOINTRO /NOUI /NOUPLOAD /O:D:\SMOKE-RC2.INI
echo rc=%errorlevel% > D:\SMOKE-RC2.RC
echo === done ===
exit
