# DOSBox Staging config for whetstone module-hang investigation (v0.7.2).
#
# CERBERUS prints one character per module entry via BIOS INT 10h
# AH=0Eh (teletype) — goes straight to VRAM, visible in the DOSBox
# Staging window. No stdout redirect so I can hand-observe the hang
# pattern. Tony can do the same on real iron.
#
# After CERBERUS exits (or we Ctrl-C out of DOSBox), the screen shows
# the accumulated tag stream. Last char = module that started right
# before the hang.

[autoexec]
mount c "C:\Development\CERBERUS"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS whetstone debug start ===
cerberus /NOUPLOAD /NOUI /NICK:WHET-DBG /O:D:\WHETDBG.INI
echo rc=%errorlevel% > D:\WHETDBG.RC
echo === done - press any key to close ===
pause
exit
