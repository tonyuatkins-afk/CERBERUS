# DOSBox Staging config for the screenshot capture harness — /NOUI
# batch text-output variant. Runs CERBERUS /NOUI so ui_render_batch
# emits the three-section text summary to stdout. Kept on screen via
# PAUSE so the capture harness has time to screenshot.

[dosbox]
machine         = svga_s3

[cpu]
core            = auto
cputype         = auto

[render]
scaler          = normal2x

[autoexec]
mount c "C:\Development\CERBERUS\dist"
mount d "C:\Development\CERBERUS\devenv"
c:
cls
cerberus /NICK:SCREENSHOT /NOTE:screenshot-noui /NOINTRO /NOUI /SKIP:DIAG /SKIP:BENCH /O:D:\CAP_NOUI.INI
echo .
echo [screenshot-pause] press any key to exit
pause > nul
exit
