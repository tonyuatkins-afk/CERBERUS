# DOSBox Staging smoketest for the bench-floppy/offline content.
# Mounts the directory as A:, boots there, runs AUTOEXEC.
# Non-interactive run: picks menu option 3 (detect-only, fastest).
# Not a full validation — just confirms the AUTOEXEC + CERBERUS chain
# works before Tony writes it to a physical floppy.
#
# Usage: "dosbox.exe" --exit -conf devenv/smoketest-floppy-offline.conf

[autoexec]
mount a "C:\Development\CERBERUS\bench-floppy\offline"
mount d "C:\Development\CERBERUS\devenv"
a:
echo === Bench floppy offline smoketest ===
rem Non-interactive: bypass MENU, run the detect-only path directly so
rem we verify CERBERUS.EXE runs from A: and emits an INI + CSV there.
rem Writes to D:\ since A: is read-only when mounted from Windows.
cerberus /NICK:SMOKE-FLOPPY /NOTE:floppy-offline /ONLY:DET /O:D:\FLOPPY.INI /CSV /NOUI > D:\FLOPPY.LOG
echo rc=%errorlevel% > D:\FLOPPY.RC
echo === done ===
exit
