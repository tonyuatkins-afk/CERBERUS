# DOSBox-X smoke-test config for CERBERUS Phase 1.
# Emulates a 486DX2 with VGA + 16MB. Runs CERBERUS and exits.
# Result files land in C:\Development\CERBERUS\devenv (= D:\ in DOS).

[sdl]
output        = surface
autolock      = false
waitonerror   = false

[dosbox]
title         = CERBERUS Smoke Test
machine       = svga_s3

[cpu]
core          = normal
cputype       = 486
cycles        = fixed 25000

[render]
scaler        = none

[serial]
serial1       = disabled
serial2       = disabled
serial3       = disabled
serial4       = disabled

[parallel]
parallel1     = disabled

[printer]
printer       = false

[dos]
hard drive data rate limit = 0

[autoexec]
mount c "C:\Development\CERBERUS\dist"
mount d "C:\Development\CERBERUS\devenv"
c:
echo === CERBERUS smoke test starting ===
cerberus /O:D:\SMOKE.INI > D:\SMOKE.LOG
echo rc=%errorlevel% > D:\SMOKE.RC
echo === done ===
exit
